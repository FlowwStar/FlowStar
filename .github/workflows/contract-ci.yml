name: Contract CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-ci.yml'

jobs:
  contract:
    runs-on: ubuntu-latest
    # This ensures all 'run' commands happen in the contracts folder
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84
          targets: wasm32v1-none

      - name: Build Contracts
        run: cargo build --target wasm32v1-none --release

      - name: Test
        # Remove --target for tests; they run on the runner's native architecture
        run: cargo test